[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    e2e: End-to-end browser tests requiring a live Flask server (deselect with -m "not e2e")
addopts =
    -v
    --tb=short
    --cov=runcoach
    --cov-report=term-missing
    --cov-report=html
