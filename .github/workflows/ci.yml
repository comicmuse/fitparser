name: CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=runcoach --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  build-and-deploy:
    name: Build and Push Docker Image
    needs: test  # Only runs if tests pass
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true  # Load into local Docker for testing
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container for health check
        run: |
          docker run -d \
            --name runcoach-test \
            -p 5000:5000 \
            -e SECRET_KEY="ci-test-secret-key-not-for-production" \
            -e DATA_DIR=/tmp/data \
            -e OPENAI_API_KEY="sk-fake-key-for-ci" \
            -e FLASK_PORT=5000 \
            ghcr.io/${{ github.repository }}:latest

      - name: Wait for container to be ready
        run: |
          echo "Waiting for container to start..."
          timeout 60 bash -c 'until docker logs runcoach-test 2>&1 | grep -q "Running on"; do sleep 2; done' || {
            echo "Container failed to start. Logs:"
            docker logs runcoach-test
            exit 1
          }

      - name: Health check
        run: |
          echo "Running health check on /status endpoint..."
          for i in {1..10}; do
            if curl -f -s http://localhost:5000/status; then
              echo "✓ Health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 3
          done
          echo "Health check failed after 10 attempts"
          docker logs runcoach-test
          exit 1

      - name: Check container logs for errors
        run: |
          echo "Checking container logs for ERROR lines..."
          ERROR_LINES=$(docker logs runcoach-test 2>&1 | grep -c "ERROR" || true)
          if [ "$ERROR_LINES" -gt 0 ]; then
            echo "Found $ERROR_LINES ERROR line(s) in container logs:"
            docker logs runcoach-test 2>&1 | grep "ERROR"
            exit 1
          fi
          echo "✓ No errors in container logs"

      - name: Stop test container
        if: always()
        run: |
          docker stop runcoach-test || true
          docker rm runcoach-test || true

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Docker Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ghcr.io/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
