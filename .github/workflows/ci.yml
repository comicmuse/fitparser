name: CI/CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest --cov=runcoach --cov-report=xml --cov-report=term --ignore=tests/e2e

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  e2e:
    name: E2E Browser Tests
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies + Playwright
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run E2E tests
        env:
          RUNCOACH_PASSWORD: "testpassword123"
        run: |
          pytest tests/e2e/ -m e2e --no-cov -v --tb=short --tracing=retain-on-failure

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  docker-smoke-test:
    name: Docker Smoke Test
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: runcoach:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --name runcoach-smoke \
            -p 5000:5000 \
            -e SECRET_KEY="ci-test-secret-key-not-for-production" \
            -e DATA_DIR=/tmp/data \
            -e FLASK_PORT=5000 \
            runcoach:ci

      - name: Wait for port 5000 to accept connections
        run: |
          echo "Waiting for port 5000..."
          timeout 60 bash -c 'until nc -z localhost 5000; do sleep 1; done' || {
            echo "Port 5000 never opened. Container logs:"
            docker logs runcoach-smoke
            exit 1
          }
          echo "Port 5000 is open"

      - name: Verify /status responds on port 5000
        run: |
          response=$(curl -sf http://localhost:5000/status) || {
            echo "HTTP request to port 5000 failed. Container logs:"
            docker logs runcoach-smoke
            exit 1
          }
          echo "/status responded: $response"

      - name: Check container logs for errors
        run: |
          errors=$(docker logs runcoach-smoke 2>&1 | grep "ERROR" || true)
          if [ -n "$errors" ]; then
            echo "ERROR lines found in container logs:"
            echo "$errors"
            exit 1
          fi
          echo "No errors in container logs"

      - name: Stop container
        if: always()
        run: |
          docker stop runcoach-smoke || true
          docker rm runcoach-smoke || true

  build-and-deploy:
    name: Build and Push Docker Image
    needs: [test, docker-smoke-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required to push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "### Docker Image Published :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ghcr.io/${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/${{ github.repository }}:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
